<script id="vs" type="x-shader/x-vertex">attribute vec4 a_position;void main(){gl_Position=a_position;}</script>
<script id="fs" type="x-shader/x-fragment">
precision highp float;uniform vec3 iResolution;uniform float iTime;
const int POINTS=16;const float WO=12000.0;const float SP=1.0/12.0;const float CS=1.0/4.0;const float BR=1.1;
void voronoi(vec2 uv,inout vec3 col){vec3 v=vec3(0.0);float t=(iTime+WO)*SP;float bd=999.0;float lb=bd;
for(int i=0;i<POINTS;i++){float fi=float(i);vec2 p=vec2(mod(fi,1.0)*0.1+sin(fi),-0.05+0.15*float(i/10)+cos(fi+t*cos(uv.x*0.025)));
float d=distance(uv,p);if(d<bd){lb=bd;bd=d;v.x=p.x;v.yz=vec2(p.x*0.4+p.y,p.y)*vec2(0.9,0.87);}}
col*=0.68+0.19*v;col+=smoothstep(0.99,1.05,1.0-abs(bd-lb))*0.85;col+=smoothstep(0.95,1.01,1.0-abs(bd-lb))*0.1*col;col+=v*0.1*smoothstep(0.5,1.0,1.0-abs(bd-lb));}
void mainImage(out vec4 f,in vec2 fc){vec2 uv=fc/iResolution.xy;vec3 c=0.5+0.5*cos(iTime*CS+uv.xyx+vec3(0,2,4));voronoi(uv*4.0-1.0,c);f=vec4(c,1.0)*BR;}
void main(){mainImage(gl_FragColor,gl_FragCoord.xy);}</script>
